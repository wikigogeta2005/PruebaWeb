<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostManager - JSONPlaceholder Client</title>
    <!-- Tailwind CSS desde CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animación suave para la entrada de las tarjetas */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .post-card-animate {
            animation: fadeInUp 0.4s ease forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-800">

    <!-- CABECERA PRINCIPAL -->
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-5 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-black tracking-tight">PostManager</h1>
                <span class="bg-indigo-500 text-indigo-100 text-xs font-bold px-2.5 py-1 rounded-full uppercase">API REST</span>
            </div>
            <p class="text-sm text-indigo-200 font-medium">JSONPlaceholder Client</p>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Zona para alertas dinámicas -->
        <div id="alert-box" class="hidden transition-all duration-300"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- COLUMNA IZQUIERDA: Formularios y Controles (4 cols de 12) -->
            <section class="lg:col-span-4 space-y-6">
                
                <!-- CARD: Consultas y Filtros -->
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm space-y-5">
                    <h2 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-3">Consultas y Filtros</h2>
                    
                    <!-- Buscar Post por ID -->
                    <div class="space-y-2">
                        <label for="search-id-input" class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Buscar Post por ID</label>
                        <div class="flex gap-2">
                            <input type="number" id="search-id-input" placeholder="Ej. 5" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" min="1" max="100">
                            <button id="btn-search-id" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-4 py-2 rounded-xl text-sm transition-colors shadow-sm">Buscar</button>
                        </div>
                    </div>

                    <!-- Filtrar por ID de Usuario -->
                    <div class="space-y-2">
                        <label for="filter-user-input" class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Filtrar por ID de Usuario</label>
                        <div class="flex gap-2">
                            <input type="number" id="filter-user-input" placeholder="Ej. 1" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" min="1" max="10">
                            <button id="btn-filter-user" class="bg-slate-700 hover:bg-slate-800 text-white font-semibold px-4 py-2 rounded-xl text-sm transition-colors shadow-sm">Filtrar</button>
                        </div>
                    </div>
                </div>

                <!-- CARD: Crear Publicación -->
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm space-y-4">
                    <h2 class="text-lg font-bold text-slate-900 border-b border-slate-100 pb-3">Crear Publicación (POST)</h2>
                    
                    <form id="create-form" class="space-y-4">
                        <div class="space-y-1.5">
                            <label for="post-user-id" class="block text-xs font-bold text-slate-500 uppercase">ID de Usuario</label>
                            <input type="number" id="post-user-id" placeholder="User ID (1-10)" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" min="1" required>
                        </div>

                        <div class="space-y-1.5">
                            <label for="post-title" class="block text-xs font-bold text-slate-500 uppercase">Título</label>
                            <input type="text" id="post-title" placeholder="Título de la publicación" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm" required>
                        </div>

                        <div class="space-y-1.5">
                            <label for="post-body" class="block text-xs font-bold text-slate-500 uppercase">Contenido</label>
                            <textarea id="post-body" rows="3" placeholder="Escribe el contenido aquí..." class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm resize-none" required></textarea>
                        </div>

                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl text-sm transition-colors shadow-md">
                            Publicar Guardado
                        </button>
                    </form>
                </div>

            </section>

            <!-- COLUMNA DERECHA: Resultados (8 cols de 12) -->
            <section class="lg:col-span-8 space-y-6">
                
                <!-- Barra de Acciones Superiores -->
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex gap-2.5">
                        <button id="btn-get-all" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border border-indigo-200 font-bold px-4 py-2 rounded-xl text-sm transition-colors shadow-sm">
                            Cargar Todos los Posts
                        </button>
                        <button id="btn-clear" class="bg-slate-50 hover:bg-slate-100 text-slate-600 border border-slate-200 font-semibold px-4 py-2 rounded-xl text-sm transition-colors">
                            Limpiar Pantalla
                        </button>
                    </div>
                    
                    <!-- Estado de la API -->
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Estado:</span>
                        <span id="status-badge" class="bg-slate-100 text-slate-700 text-xs font-semibold px-3 py-1.5 rounded-full">
                            Inactivo
                        </span>
                    </div>
                </div>

                <!-- TÍTULO DE SECCIÓN -->
                <div class="flex items-center justify-between border-b border-slate-200 pb-2">
                    <h2 class="text-sm font-extrabold uppercase tracking-widest text-slate-400">Resultados</h2>
                </div>

                <!-- CONTENEDOR DE POSTS -->
                <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Estado inicial (Placeholder) -->
                    <div class="md:col-span-2 bg-white p-8 rounded-2xl border border-dashed border-slate-200 text-center text-slate-400">
                        Presiona "Cargar Todos los Posts" o realiza una consulta para empezar.
                    </div>
                </div>

            </section>
        </div>
    </main>

    <!-- MODAL DE EDICIÓN (PATCH) -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 transition-all">
        <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl p-6 space-y-4 border border-slate-100">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <h3 class="text-lg font-bold text-slate-800">Editar Título del Post</h3>
                <span class="text-xs bg-amber-50 text-amber-700 font-bold px-2.5 py-1 rounded-full border border-amber-200">PATCH</span>
            </div>

            <!-- ID oculto del post que se edita -->
            <input type="hidden" id="edit-post-id">

            <div class="space-y-1.5">
                <label for="edit-title-input" class="block text-xs font-bold text-slate-500 uppercase">Nuevo Título</label>
                <input type="text" id="edit-title-input" class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>

            <div class="flex justify-end gap-2 pt-2">
                <button id="btn-close-modal" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-4 py-2 rounded-xl text-sm transition-colors">
                    Cancelar
                </button>
                <button id="btn-save-patch" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-xl text-sm transition-colors shadow-md">
                    Guardar Cambios
                </button>
            </div>
        </div>
    </div>

    <script src="../dist/app.js" type="module"></script>
</body>
</html>
